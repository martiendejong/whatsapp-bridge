name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/WhatsAppBridge.csproj

      - name: Build
        run: dotnet build src/WhatsAppBridge.csproj --no-restore -c Release

      - name: Publish
        run: dotnet publish src/WhatsAppBridge.csproj -c Release -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-bridge
          path: ./publish
